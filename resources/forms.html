<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms in HTML</title>
</head>
<body>
    
    <a href="page_2.html">This takes you back to Page 2</a>

    <form action="database.php" method="get"> 
        <br>
        <div>
            <label for="fname">First Name:</label>
            <input type="text" id="fname" name="fname" placeholder="Spongebob" required>
        </div>

        <br>
        <div>
            <label for="lname">Last Name:</label>
            <input type="text" id="lname" name="lname" placeholder="Sqaurepants" required>
        </div>

        <br>
        <div>
            <label for="pass">Password:</label>
            <input type="password" id="pass" name="pass" maxlength="12" required>
        </div>
    
        <br>
        <div>
            <label for="email">E-mail:</label>
            <input type="email" id="email" name="email" placeholder="SPants@gmail.com" required>
        </div>

        <br>
        <div>
            <label for="tel">Phone:</label>
            <input type="tel" id="tel" name="tel" placeholder="01234567689" required>
        </div>

        <br>
        <div>
            <label for="dob">Phone:</label>
            <input type="date" id="dob" name="dob" required>
        </div>

        <br>
        <div>
            <label for="quantity">Phone:</label>
            <input type="number" id="quantity" name="quantity" min="0" max="99" value="1" required>
        </div>
        
        <br>
        <div>
            <label for="Title">Title:</label>

            <label for="Mr.">Mr.</label>
            <input type="radio" id="Mr." name="title" value="Mr.">

            <label for="Mrs.">Mrs.</label>
            <input type="radio" id="Mrs." name="title" value="Mrs.">

            <label for="Dr.">Dr.</label>
            <input type="radio" id="Dr." name="title" value="Dr.">

        </div>

        <br>
        <div>
            <label for="pay">Payment:</label>
            <select id="pay" name="pay">
                <option>Visa</option>
                <option>Mastercard</option>
                <option>Giftcard</option>
            </select>
        </div>
    
        <br>
        <div>
            <label for="checkbox">Visited this Cool Website</label>
            <input type="checkbox" id="checkbox" name="checkbox" required>
        </div>

        <br>
        <div>
            <input type="reset">
        </div>
    
        <br>
        <div>
            <input type="submit">
        </div>
    
    
    
    
    </form>


</body>
</html>
